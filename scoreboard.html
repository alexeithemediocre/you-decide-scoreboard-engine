<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard — Live</title>
<style>
  :root {
    --row-height: 64px;
    --row-gap: 10px;
    --col-gap: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 20% 0%, #2b1055 0%, #0d0d2b 55%, #060616 100%);
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  .stage {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #ff4ecd, #b249f8, #4ec9ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Custom background layer: sits above the body gradient (the default
     fallback) but below all content. Empty = default background shows. */
  #bg-layer {
    position: fixed;
    inset: 0;
    z-index: -1;
  }
  #bg-layer img, #bg-layer video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* The board is a relative container; every row is absolutely positioned
     and moved with translateY. Changing the translateY triggers the CSS
     transition, which is what makes rows glide up and down. */
  #board {
    position: relative;
    transition: height 0.6s ease;
  }

  /* Each row spans half the board; JS places it in the left or right
     column via translateX, so a column switch animates as one glide. */
  .row {
    position: absolute;
    left: 0;
    width: calc(50% - (var(--col-gap) / 2));
    height: var(--row-height);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    border-radius: 12px;
    background: linear-gradient(90deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
    border: 1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(4px);
    transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.4s ease, border-color 0.4s ease, opacity 0.5s ease;
    opacity: 1;
  }

  .row.entering {
    opacity: 0;
    transform: translateX(-40px);
  }

  /* Gold / silver / bronze accents for the top three */
  .row.rank-1 { border-color: rgba(255, 215, 0, 0.55); box-shadow: 0 0 24px rgba(255, 215, 0, 0.18); }
  .row.rank-2 { border-color: rgba(200, 200, 220, 0.45); }
  .row.rank-3 { border-color: rgba(205, 127, 50, 0.45); }

  /* Flash when an entry just received points */
  .row.scored {
    background: linear-gradient(90deg, rgba(255, 78, 205, 0.45), rgba(178, 73, 248, 0.25));
    border-color: #ff4ecd;
    box-shadow: 0 0 30px rgba(255, 78, 205, 0.45);
  }

  .flag {
    width: 30px;
    flex-shrink: 0;
  }
  .flag.empty { visibility: hidden; } /* keep the slot so names align */
  #board.no-flags .flag { display: none; } /* no flags anywhere: reclaim the space */

  .rank {
    width: 34px;
    font-size: 19px;
    font-weight: 800;
    text-align: center;
    color: rgba(255,255,255,0.85);
    flex-shrink: 0;
  }
  .row.rank-1 .rank { color: #ffd700; }

  .name {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .points {
    min-width: 60px;
    padding: 7px 12px;
    border-radius: 8px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 19px;
    font-weight: 800;
    text-align: center;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  /* Little "+N" badge that pops up next to the points when scored */
  .delta {
    position: absolute;
    right: 92px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    font-weight: 800;
    color: #ff4ecd;
    opacity: 0;
    pointer-events: none;
  }
  .delta.show {
    animation: pop 1.6s ease forwards;
  }
  @keyframes pop {
    0%   { opacity: 0; transform: translateY(-50%) scale(0.5); }
    15%  { opacity: 1; transform: translateY(-50%) scale(1.25); }
    35%  { transform: translateY(-50%) scale(1); }
    75%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-90%) scale(1); }
  }

  #empty {
    text-align: center;
    padding: 60px 0;
    font-size: 15px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>
  <div id="bg-layer"></div>
  <div class="stage">
    <header>
      <h1 id="board-title">Grand Final</h1>
    </header>
    <div id="board"></div>
    <div id="empty">Waiting for entries… add them on the control page.</div>
  </div>

<script>
(function () {
  var STORAGE_KEY = "ydse-state";
  var ROW_HEIGHT = 64;   // keep in sync with --row-height
  var ROW_GAP = 10;      // keep in sync with --row-gap
  var COL_GAP = 18;      // keep in sync with --col-gap

  var board = document.getElementById("board");
  var emptyNote = document.getElementById("empty");

  // id -> row element, so we can reuse DOM nodes and animate them
  var rowsById = {};
  // remember previous points so we know who just scored
  var prevPoints = {};
  // last award sequence number we already flashed (null = first render)
  var lastSeenAwardSeq = null;

  function readState() {
    var state;
    try {
      var parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
      state = parsed && Array.isArray(parsed.entries) ? parsed : { entries: [] };
    } catch (e) {
      state = { entries: [] };
    }
    if (!state.display) state.display = { showArtist: true, showSong: true };
    // Migrate pre-structured entries: "Country — Artist — Song" in .name
    state.entries.forEach(function (e) {
      if (e.country === undefined) {
        var parts = (e.name || "").split(/—|–| - /).map(function (p) { return p.trim(); });
        e.country = parts[0] || "";
        e.artist = parts[1] || "";
        e.song = parts.slice(2).join(" — ") || "";
      }
      if (typeof e.tieBreak !== "number") e.tieBreak = e.order;
    });
    return state;
  }

  // What the stream sees: country, then artist/song if enabled and present
  function displayName(entry, display) {
    var parts = [entry.country];
    if (display.showArtist && entry.artist) parts.push(entry.artist);
    if (display.showSong && entry.song) parts.push(entry.song);
    return parts.filter(Boolean).join(" — ");
  }

  // ---- Title (text / font / color set on the control page) ----
  var titleEl = document.getElementById("board-title");
  function applyTitle(state) {
    var title = state.title || {};
    titleEl.textContent = title.text || "Grand Final";
    titleEl.style.fontFamily = title.font || "";
    if (title.color) {
      // solid custom color replaces the default gradient
      titleEl.style.background = "none";
      titleEl.style.webkitTextFillColor = title.color;
      titleEl.style.color = title.color;
    } else {
      titleEl.style.background = "";
      titleEl.style.webkitTextFillColor = "";
      titleEl.style.color = "";
    }
  }

  // ---- Custom background (file stored in IndexedDB by the control page) ----
  function idbCall(mode, fn) {
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open("ydse-files", 1);
      req.onupgradeneeded = function () { req.result.createObjectStore("files"); };
      req.onerror = function () { reject(req.error); };
      req.onsuccess = function () {
        var db = req.result;
        var r = fn(db.transaction("files", mode).objectStore("files"));
        r.onsuccess = function () { resolve(r.result); db.close(); };
        r.onerror = function () { reject(r.error); db.close(); };
      };
    });
  }
  function idbGet(key) { return idbCall("readonly", function (s) { return s.get(key); }); }

  var bgLayer = document.getElementById("bg-layer");
  var lastBgSeq = null;
  var bgObjectUrl = null;
  function clearBackground() {
    bgLayer.innerHTML = ""; // default body gradient shows again
    if (bgObjectUrl) { URL.revokeObjectURL(bgObjectUrl); bgObjectUrl = null; }
  }
  function applyBackground(state) {
    var bg = state.background;
    var seq = bg && bg.kind ? bg.seq : 0;
    if (seq === lastBgSeq) return; // nothing changed
    lastBgSeq = seq;
    if (!seq) { clearBackground(); return; }
    idbGet("background").then(function (record) {
      if (!record || !record.blob) { clearBackground(); return; }
      clearBackground();
      bgObjectUrl = URL.createObjectURL(record.blob);
      var el;
      if (bg.kind === "video") {
        el = document.createElement("video");
        el.muted = true;
        el.loop = true;
        el.autoplay = true;
        el.playsInline = true;
      } else {
        el = document.createElement("img");
      }
      // Unreadable/corrupt file: drop back to the default background
      el.addEventListener("error", clearBackground);
      el.src = bgObjectUrl;
      if (bg.kind === "video") el.play().catch(function () {});
      bgLayer.appendChild(el);
    }).catch(clearBackground);
  }

  function sortedEntries(state) {
    // Higher points first; ties broken by tieBreak (the control page's
    // ▲▼ arrows), then by who was added first. Must match control.html.
    return state.entries.slice().sort(function (a, b) {
      if (b.points !== a.points) return b.points - a.points;
      if (a.tieBreak !== b.tieBreak) return a.tieBreak - b.tieBreak;
      return a.order - b.order;
    });
  }

  function buildRow(entry) {
    var row = document.createElement("div");
    row.className = "row entering";
    row.innerHTML =
      '<div class="rank"></div>' +
      '<img class="flag empty" alt="">' +
      '<div class="name"></div>' +
      '<div class="delta"></div>' +
      '<div class="points"></div>';
    row.querySelector(".name").textContent = entry.country;
    var flag = row.querySelector(".flag");
    flag.addEventListener("error", function () { flag.classList.add("empty"); });
    if (entry.flagUrl) {
      flag.src = entry.flagUrl;
      flag.classList.remove("empty");
    }
    board.appendChild(row);
    // Let the browser paint the "entering" state first, then release it
    // so the fade-in transition can play.
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        row.classList.remove("entering");
      });
    });
    return row;
  }

  function render() {
    var state = readState();
    applyTitle(state);
    applyBackground(state);
    var entries = sortedEntries(state);
    var seenIds = {};

    emptyNote.style.display = entries.length ? "none" : "block";

    // Two columns: ranks 1..leftCount go down the left column, the rest
    // continue down the right one. Odd totals leave the extra row on the left.
    var leftCount = Math.ceil(entries.length / 2);
    board.style.height = leftCount * (ROW_HEIGHT + ROW_GAP) + "px";

    var anyFlags = entries.some(function (e) { return e.flagUrl; });
    board.classList.toggle("no-flags", !anyFlags);

    entries.forEach(function (entry, index) {
      seenIds[entry.id] = true;
      var row = rowsById[entry.id];
      if (!row) {
        row = buildRow(entry);
        rowsById[entry.id] = row;
      }

      // Position by rank — the transform transition animates the move.
      // translateX(100%) is one full row width, i.e. the right column;
      // switching columns therefore animates as a diagonal glide.
      var inRightColumn = index >= leftCount;
      var x = inRightColumn ? "calc(100% + " + COL_GAP + "px)" : "0px";
      var y = (inRightColumn ? index - leftCount : index) * (ROW_HEIGHT + ROW_GAP);
      row.style.transform = "translate(" + x + ", " + y + "px)";
      row.querySelector(".rank").textContent = index + 1;
      row.querySelector(".points").textContent = entry.points;
      row.querySelector(".name").textContent = displayName(entry, state.display);

      row.classList.remove("rank-1", "rank-2", "rank-3");
      if (index < 3) row.classList.add("rank-" + (index + 1));

      // Did this entry just receive an award? Prefer the explicit award
      // written by the control page (it also covers "+0" and negative
      // corrections); fall back to a points diff for direct state edits.
      var award = state.lastAward;
      var isFreshAward = award && lastSeenAwardSeq !== null && award.seq !== lastSeenAwardSeq;
      var before = prevPoints[entry.id];
      var badgeText = null;
      if (isFreshAward && award.id === entry.id) {
        badgeText = (award.amount < 0 ? "−" : "+") + Math.abs(award.amount);
      } else if (!isFreshAward && typeof before === "number" && entry.points > before) {
        badgeText = "+" + (entry.points - before);
      }
      if (badgeText !== null) {
        var delta = row.querySelector(".delta");
        delta.textContent = badgeText;
        delta.classList.remove("show");
        void delta.offsetWidth; // restart the animation
        delta.classList.add("show");

        row.classList.add("scored");
        setTimeout(function () { row.classList.remove("scored"); }, 1500);
      }
      prevPoints[entry.id] = entry.points;
    });

    // Remove rows for deleted entries
    Object.keys(rowsById).forEach(function (id) {
      if (!seenIds[id]) {
        board.removeChild(rowsById[id]);
        delete rowsById[id];
        delete prevPoints[id];
      }
    });

    // Remember which award we've shown (first render: don't replay an
    // award that happened before this page was opened).
    lastSeenAwardSeq = state.lastAward ? state.lastAward.seq : 0;
  }

  // React instantly when another tab changes the data…
  window.addEventListener("storage", function (event) {
    if (event.key === STORAGE_KEY) render();
  });
  // …and also poll as a safety net (covers browsers where the storage
  // event does not fire reliably for local files).
  setInterval(render, 400);

  render();
})();
</script>
</body>
</html>
